<script>
window.ERPAI = {
  token: 'erp_pat_live_REDACTED',
  baseUrl: 'https://api.erpai.studio',
  appId: 'afe8c4540708da6ca9e6fe79',
  orgName: 'Telecom',
  appName: 'telecom',
  theme: 'light'
};
</script>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Erasure Queue</title>
  <link rel="stylesheet" href="/runtime/erpai-pages-runtime.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { padding: 20px; font-family: 'Geist Sans', system-ui, -apple-system, sans-serif; }
    .cb-header { margin-bottom: 20px; display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .cb-title { font-size: 20px; font-weight: 600; color: hsl(var(--foreground)); letter-spacing: -0.02em; margin: 0; }
    .cb-subtitle { font-size: 13px; color: hsl(var(--muted-foreground)); margin-top: 4px; max-width: 760px; }
    .cb-btn { padding: 8px 12px; font-size: 13px; font-weight: 500; border-radius: 8px; border: 1px solid hsl(var(--border)); background: hsl(var(--background)); cursor: pointer; }
    .cb-btn:hover { background: hsl(var(--muted) / 0.4); }
    .cb-btn-small { padding: 4px 8px; font-size: 11px; font-weight: 500; border-radius: 6px; border: 1px solid hsl(var(--border)); background: hsl(var(--background)); cursor: pointer; }
    .cb-btn-approve { background: #dcfce7; color: #166534; border-color: #86efac; }
    .cb-btn-reject { background: #fee2e2; color: #b91c1c; border-color: #fca5a5; }
    .cb-btn-progress { background: #fef9c3; color: #854d0e; border-color: #fde047; }

    .cb-stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; }
    @media (max-width: 1100px) { .cb-stats { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 700px)  { .cb-stats { grid-template-columns: repeat(2, 1fr); } }
    .cb-stat { background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: 12px; padding: 14px; }
    .cb-stat-label { font-size: 11px; color: hsl(var(--muted-foreground)); text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; margin-bottom: 6px; }
    .cb-stat-val { font-size: 22px; font-weight: 600; font-variant-numeric: tabular-nums; line-height: 1.1; }
    .cb-stat.alert { border-color: #ef4444; background: rgba(239, 68, 68, 0.05); }
    .cb-stat.alert .cb-stat-val { color: #ef4444; }

    .cb-section-head { display: flex; align-items: center; gap: 8px; margin: 24px 0 12px; }
    .cb-section-title { font-size: 14px; font-weight: 600; margin: 0; }
    .cb-section-sub { font-size: 12px; color: hsl(var(--muted-foreground)); font-weight: 500; }

    .cb-chart-row { display: grid; grid-template-columns: 1fr 2fr; gap: 16px; margin-bottom: 20px; }
    @media (max-width: 900px) { .cb-chart-row { grid-template-columns: 1fr; } }
    .cb-chart-card { padding: 16px; background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: 12px; }
    .cb-chart-title { font-size: 13px; font-weight: 600; margin: 0 0 12px 0; }
    .cb-chart-canvas-wrap { position: relative; height: 260px; }

    .cb-table { width: 100%; border-collapse: collapse; background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: 12px; overflow: hidden; }
    .cb-table thead { background: hsl(var(--muted) / 0.5); }
    .cb-table th { text-align: left; font-size: 11px; font-weight: 600; color: hsl(var(--muted-foreground)); text-transform: uppercase; letter-spacing: 0.04em; padding: 10px 12px; border-bottom: 1px solid hsl(var(--border)); }
    .cb-table td { padding: 10px 12px; border-bottom: 1px solid hsl(var(--border)); font-size: 13px; vertical-align: middle; }
    .cb-table tbody tr:last-child td { border-bottom: none; }
    .cb-table tbody tr:hover { background: hsl(var(--muted) / 0.4); }

    .cb-empty { padding: 32px 16px; text-align: center; color: hsl(var(--muted-foreground)); font-size: 13px; background: hsl(var(--card)); border: 1px dashed hsl(var(--border)); border-radius: 12px; }
    .cb-muted { color: hsl(var(--muted-foreground)); }
    .cb-code { font-family: 'SF Mono', Monaco, Menlo, monospace; font-size: 12px; }
    .cb-pill { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .cb-pill-pending { background: #fef9c3; color: #854d0e; }
    .cb-pill-approved { background: #dbeafe; color: #1e40af; }
    .cb-pill-progress { background: #fde68a; color: #92400e; }
    .cb-pill-done { background: #dcfce7; color: #166534; }
    .cb-pill-reject { background: #fee2e2; color: #b91c1c; }
    .cb-actions { display: flex; gap: 4px; flex-wrap: wrap; }
  </style>
</head>
<body>
  <div class="cb-header">
    <div>
      <h1 class="cb-title">Erasure Queue</h1>
      <p class="cb-subtitle">Right-to-erasure (GDPR/POPIA) request workflow — review, approve/reject, and track SLA on customer data-deletion requests.</p>
    </div>
    <button class="cb-btn" onclick="window.location.reload()">Refresh</button>
  </div>

  <div class="cb-section-head"><h2 class="cb-section-title">KPIs</h2><span class="cb-section-sub" id="cb-kpi-sub">Loading…</span></div>
  <div class="cb-stats" id="cb-stats"></div>

  <div class="cb-section-head"><h2 class="cb-section-title">Distribution</h2></div>
  <div class="cb-chart-row">
    <div class="cb-chart-card">
      <h3 class="cb-chart-title">Requests by Status</h3>
      <div class="cb-chart-canvas-wrap"><canvas id="ch-status"></canvas></div>
    </div>
    <div class="cb-chart-card">
      <h3 class="cb-chart-title">Requests by Reason</h3>
      <div class="cb-chart-canvas-wrap"><canvas id="ch-reason"></canvas></div>
    </div>
  </div>

  <div class="cb-section-head"><h2 class="cb-section-title">Pending Review</h2><span class="cb-section-sub" id="cb-pend-count">—</span></div>
  <div id="cb-pend-wrap"><div class="cb-empty">Loading…</div></div>

  <div class="cb-section-head"><h2 class="cb-section-title">Completed (Last 30 Days)</h2><span class="cb-section-sub" id="cb-done-count">—</span></div>
  <div id="cb-done-wrap"><div class="cb-empty">Loading…</div></div>

  <script src="/runtime/erpai-pages-runtime.js"></script>
  <script>
    let TBL = 'a1776271424351_erasure_requests';

    const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    const fmtInt = n => n == null || isNaN(n) ? '—' : Number(n).toLocaleString();
    const fmtDT = ts => { if (!ts || String(ts).startsWith('1970')) return '—'; const d = new Date(String(ts).replace(' ','T')+'Z'); return isNaN(d) ? ts : d.toLocaleString(undefined,{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); };

    async function sql(q) {
      try {
        const r = await fetch(`${window.ERPAI.baseUrl}/v1/agent/app/sql/execute`, {
          method:'POST',
          headers:{'Authorization':`Bearer ${window.ERPAI.token}`,'Content-Type':'application/json'},
          body: JSON.stringify({ appId: window.ERPAI.appId, sqlQuery: q, limit: 500 })
        });
        const j = await r.json();
        if (!j.success) {
          if (j.message && /Unknown table/i.test(j.message) && !q.includes(TBL+'_1')) {
            const retry = q.replaceAll(TBL, TBL+'_1'); TBL = TBL+'_1'; return sql(retry);
          }
          console.warn('SQL fail:', j.message, q); return null;
        }
        return j.data.rows;
      } catch (e) { console.warn(e); return null; }
    }

    const STATUS_MAP = { '[1]':'Pending Review', '[2]':'Approved', '[3]':'In Progress', '[4]':'Completed', '[5]':'Rejected' };
    const STATUS_CLASS = { '[1]':'cb-pill-pending','[2]':'cb-pill-approved','[3]':'cb-pill-progress','[4]':'cb-pill-done','[5]':'cb-pill-reject' };
    const REASON_MAP = { '[1]':'GDPR Art. 17','[2]':'POPIA Sec. 24','[3]':'Account Closure','[4]':'Legal Order','[5]':'Other' };

    function isEmpty(x){ return !x || x.length === 0; }

    function renderEmpty(){
      document.getElementById('cb-stats').innerHTML = '';
      document.getElementById('cb-kpi-sub').textContent = 'No erasure requests yet';
      ['cb-pend-wrap','cb-done-wrap'].forEach(id => document.getElementById(id).innerHTML = `<div class="cb-empty">No erasure requests in the queue.</div>`);
      ['ch-status','ch-reason'].forEach(id => {
        const el = document.getElementById(id).parentElement;
        el.innerHTML = `<div class="cb-empty" style="height:260px;display:flex;align-items:center;justify-content:center;">No data</div>`;
      });
    }

    async function loadKpis() {
      const tot = await sql(`SELECT count() AS v FROM (SELECT _id FROM ${TBL} WHERE _deleted=0 GROUP BY _id)`);
      if (!tot || !tot[0] || Number(tot[0].v) === 0) return { empty: true };

      const pend = await sql(`SELECT count() AS v FROM (SELECT argMax(status,_version) AS st FROM ${TBL} WHERE _deleted=0 GROUP BY _id) WHERE st='[1]'`);
      const appr = await sql(`SELECT count() AS v FROM (SELECT argMax(status,_version) AS st FROM ${TBL} WHERE _deleted=0 GROUP BY _id) WHERE st='[2]'`);
      const doneYtd = await sql(`SELECT count() AS v FROM (SELECT argMax(status,_version) AS st, argMax(completed_at,_version) AS c FROM ${TBL} WHERE _deleted=0 GROUP BY _id) WHERE st='[4]' AND toYear(c)=toYear(today())`);
      const rejYtd = await sql(`SELECT count() AS v FROM (SELECT argMax(status,_version) AS st, argMax(updated_at,_version) AS u FROM ${TBL} WHERE _deleted=0 GROUP BY _id) WHERE st='[5]' AND toYear(u)=toYear(today())`);
      const sla = await sql(`SELECT avg(dateDiff('day', req, c)) AS v FROM (SELECT argMax(status,_version) AS st, argMax(requested_at,_version) AS req, argMax(completed_at,_version) AS c FROM ${TBL} WHERE _deleted=0 GROUP BY _id) WHERE st='[4]' AND c > req`);

      const kpis = [
        { label:'Pending Review', val: fmtInt(pend && pend[0] ? pend[0].v : 0), alert: (pend && pend[0] && Number(pend[0].v) > 0) },
        { label:'Approved · Not Processed', val: fmtInt(appr && appr[0] ? appr[0].v : 0) },
        { label:'Completed YTD', val: fmtInt(doneYtd && doneYtd[0] ? doneYtd[0].v : 0) },
        { label:'Rejected YTD', val: fmtInt(rejYtd && rejYtd[0] ? rejYtd[0].v : 0) },
        { label:'Avg SLA (days)', val: sla && sla[0] && sla[0].v != null ? Number(sla[0].v).toFixed(1) : '—' }
      ];
      document.getElementById('cb-stats').innerHTML = kpis.map(k => `<div class="cb-stat ${k.alert?'alert':''}"><div class="cb-stat-label">${k.label}</div><div class="cb-stat-val">${k.val}</div></div>`).join('');
      document.getElementById('cb-kpi-sub').textContent = 'Refreshed just now';
      return { empty: false };
    }

    async function loadStatusChart() {
      const rows = await sql(`SELECT st, count() AS n FROM (SELECT argMax(status,_version) AS st FROM ${TBL} WHERE _deleted=0 GROUP BY _id) GROUP BY st`);
      if (isEmpty(rows)) return;
      new Chart(document.getElementById('ch-status'), {
        type:'doughnut',
        data:{ labels: rows.map(r=>STATUS_MAP[r.st]||r.st||'—'), datasets:[{ data: rows.map(r=>Number(r.n)), backgroundColor:['#f59e0b','#3b82f6','#fb923c','#10b981','#ef4444'] }]},
        options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:11}}}} }
      });
    }

    async function loadReasonChart() {
      const rows = await sql(`SELECT r, count() AS n FROM (SELECT argMax(reason,_version) AS r FROM ${TBL} WHERE _deleted=0 GROUP BY _id) GROUP BY r ORDER BY n DESC LIMIT 10`);
      if (isEmpty(rows)) return;
      new Chart(document.getElementById('ch-reason'), {
        type:'bar',
        data:{ labels: rows.map(r=>REASON_MAP[r.r]||r.r||'—'), datasets:[{ label:'Requests', data: rows.map(r=>Number(r.n)), backgroundColor:'#8b5cf6' }]},
        options:{ indexAxis:'y', responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{beginAtZero:true}} }
      });
    }

    async function loadPending() {
      const rows = await sql(`SELECT _id, argMax(request_code,_version) AS code, argMax(customer,_version) AS cust, argMax(requested_at,_version) AS req, argMax(reason,_version) AS reason, argMax(retention_override,_version) AS ro, argMax(status,_version) AS st FROM ${TBL} WHERE _deleted=0 GROUP BY _id HAVING st='[1]' ORDER BY req DESC LIMIT 50`);
      const el = document.getElementById('cb-pend-wrap');
      const c = document.getElementById('cb-pend-count');
      if (rows == null) { el.innerHTML = '<div class="cb-empty">Unable to load pending.</div>'; return; }
      if (!rows.length) { el.innerHTML = '<div class="cb-empty">No pending requests.</div>'; c.textContent = '0'; return; }
      c.textContent = `${rows.length} pending`;
      el.innerHTML = `<table class="cb-table"><thead><tr><th>Request</th><th>Customer</th><th>Requested</th><th>Reason</th><th>Retention Override</th><th>Actions</th></tr></thead><tbody>${rows.map(r=>{
        const ro = String(r.ro)==='1' ? '<span class="cb-pill cb-pill-pending">Override</span>' : '<span class="cb-muted">—</span>';
        return `<tr>
          <td><span class="cb-code">${esc(r.code||'—')}</span></td>
          <td class="cb-code">${esc((r.cust||'').slice(0,12))}…</td>
          <td class="cb-muted">${fmtDT(r.req)}</td>
          <td>${esc(REASON_MAP[r.reason]||r.reason||'—')}</td>
          <td>${ro}</td>
          <td><div class="cb-actions">
            <button class="cb-btn-small cb-btn-approve" onclick="stub('approve','${esc(r.code)}')">Approve</button>
            <button class="cb-btn-small cb-btn-reject" onclick="stub('reject','${esc(r.code)}')">Reject</button>
            <button class="cb-btn-small cb-btn-progress" onclick="stub('progress','${esc(r.code)}')">In Progress</button>
          </div></td>
        </tr>`;
      }).join('')}</tbody></table>`;
    }

    async function loadDone() {
      const rows = await sql(`SELECT _id, argMax(request_code,_version) AS code, argMax(customer,_version) AS cust, argMax(completed_at,_version) AS c, argMax(reason,_version) AS reason, argMax(status,_version) AS st FROM ${TBL} WHERE _deleted=0 GROUP BY _id HAVING st='[4]' AND c > now() - INTERVAL 30 DAY ORDER BY c DESC LIMIT 50`);
      const el = document.getElementById('cb-done-wrap');
      const cn = document.getElementById('cb-done-count');
      if (rows == null) { el.innerHTML = '<div class="cb-empty">Unable to load completed.</div>'; return; }
      if (!rows.length) { el.innerHTML = '<div class="cb-empty">None completed in the last 30 days.</div>'; cn.textContent = '0'; return; }
      cn.textContent = `${rows.length} completed`;
      el.innerHTML = `<table class="cb-table"><thead><tr><th>Request</th><th>Customer</th><th>Completed</th><th>Reason</th><th>Status</th></tr></thead><tbody>${rows.map(r=>`<tr>
        <td><span class="cb-code">${esc(r.code||'—')}</span></td>
        <td class="cb-code">${esc((r.cust||'').slice(0,12))}…</td>
        <td class="cb-muted">${fmtDT(r.c)}</td>
        <td>${esc(REASON_MAP[r.reason]||r.reason||'—')}</td>
        <td><span class="cb-pill cb-pill-done">Completed</span></td>
      </tr>`).join('')}</tbody></table>`;
    }

    window.stub = (action, code) => { alert(`Stub: ${action} — ${code}\n\nThis button is not wired up yet. Use the Erasure Requests table to act.`); };

    async function main() {
      const k = await loadKpis();
      if (k && k.empty) { renderEmpty(); return; }
      await Promise.all([loadStatusChart(), loadReasonChart(), loadPending(), loadDone()]);
    }
    main();
  </script>
</body>
</html>
