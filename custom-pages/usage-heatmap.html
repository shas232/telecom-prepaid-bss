<script>
window.ERPAI = {
  token: 'erp_pat_live_REDACTED',
  baseUrl: 'https://api.erpai.studio',
  appId: 'afe8c4540708da6ca9e6fe79',
  orgName: 'Telecom',
  appName: 'telecom',
  theme: 'light'
};
</script>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usage Patterns Heatmap</title>
  <link rel="stylesheet" href="/runtime/erpai-pages-runtime.css">
  <style>
    body { padding: 20px; font-family: 'Geist Sans', system-ui, -apple-system, sans-serif; }
    .hm-header { margin-bottom: 20px; }
    .hm-title { font-size: 18px; font-weight: 600; letter-spacing: -0.02em; margin: 0; color: hsl(var(--foreground)); }
    .hm-subtitle { font-size: 13px; color: hsl(var(--muted-foreground)); margin-top: 2px; }

    .hm-filter-row { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
    .hm-filter-row label { font-size: 13px; color: hsl(var(--muted-foreground)); font-weight: 500; display: flex; align-items: center; gap: 6px; }
    .hm-pill-group { display: flex; gap: 4px; background: hsl(var(--muted) / 0.4); padding: 3px; border-radius: 8px; }
    .hm-pill { padding: 6px 12px; font-size: 12px; font-weight: 500; border-radius: 6px; cursor: pointer; border: none; background: transparent; color: hsl(var(--muted-foreground)); }
    .hm-pill.active { background: hsl(var(--background)); color: hsl(var(--foreground)); box-shadow: 0 1px 2px rgb(0 0 0 / 0.05); }

    .hm-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
    @media (max-width: 768px) { .hm-stats { grid-template-columns: repeat(2, 1fr); } }
    .hm-stat { background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: 12px; padding: 14px; box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05); }
    .hm-stat-label { font-size: 11px; color: hsl(var(--muted-foreground)); text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; margin-bottom: 4px; }
    .hm-stat-val { font-size: 20px; font-weight: 600; font-variant-numeric: tabular-nums; color: hsl(var(--foreground)); }
    .hm-stat-sub { font-size: 11px; color: hsl(var(--muted-foreground)); margin-top: 2px; }

    .hm-card { background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: 12px; padding: 20px; box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05); margin-bottom: 20px; }
    .hm-card h3 { margin: 0 0 16px; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; color: hsl(var(--foreground)); }
    .hm-card-meta { margin-left: auto; font-size: 12px; color: hsl(var(--muted-foreground)); font-weight: 500; }

    /* Heatmap grid */
    .hm-grid { display: grid; grid-template-columns: auto repeat(24, 1fr); gap: 3px; font-size: 11px; color: hsl(var(--muted-foreground)); }
    .hm-grid .day-label { font-weight: 600; padding: 8px 10px 8px 0; text-align: right; align-self: center; color: hsl(var(--foreground)); font-size: 12px; }
    .hm-grid .hour-header { padding: 4px 2px; text-align: center; font-size: 10px; font-variant-numeric: tabular-nums; }
    .hm-cell {
      aspect-ratio: 1;
      border-radius: 4px;
      position: relative;
      cursor: pointer;
      transition: transform 0.1s;
      background: hsl(var(--muted) / 0.25);
    }
    .hm-cell:hover { transform: scale(1.15); z-index: 10; outline: 2px solid hsl(var(--foreground)); }
    .hm-cell-label { display: flex; align-items: center; justify-content: center; font-size: 9px; color: #fff; font-weight: 600; }

    .hm-legend { margin-top: 16px; display: flex; align-items: center; gap: 12px; font-size: 11px; color: hsl(var(--muted-foreground)); }
    .hm-legend-gradient { height: 10px; width: 200px; border-radius: 4px; }
    .hm-legend-labels { display: flex; justify-content: space-between; width: 200px; font-variant-numeric: tabular-nums; }

    .hm-tooltip { position: absolute; background: hsl(var(--foreground)); color: hsl(var(--background)); padding: 6px 10px; border-radius: 6px; font-size: 11px; white-space: nowrap; z-index: 100; pointer-events: none; transform: translate(-50%, calc(-100% - 8px)); font-variant-numeric: tabular-nums; }

    .hm-insights { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    @media (max-width: 900px) { .hm-insights { grid-template-columns: 1fr; } }
    .hm-insight { padding: 12px; background: hsl(var(--muted) / 0.3); border-radius: 8px; font-size: 13px; }
    .hm-insight-title { font-weight: 600; color: hsl(var(--foreground)); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
    .hm-insight-value { font-size: 16px; font-weight: 600; color: hsl(var(--foreground)); font-variant-numeric: tabular-nums; margin: 6px 0 2px; }
    .hm-insight-sub { font-size: 12px; color: hsl(var(--muted-foreground)); }
  </style>
</head>
<body>
  <div class="hm-header">
    <h1 class="hm-title">Usage Patterns Heatmap</h1>
    <p class="hm-subtitle">When do customers actually use the network? Day-of-week × hour-of-day heatmap reveals peak hours, quiet windows, and service-specific patterns.</p>
  </div>

  <div class="hm-filter-row">
    <label>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h18"/><path d="M21 3v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V3"/></svg>
      Metric:
    </label>
    <div class="hm-pill-group" id="metric-pills">
      <button class="hm-pill active" data-metric="events">Event Count</button>
      <button class="hm-pill" data-metric="data">Data (MB)</button>
      <button class="hm-pill" data-metric="voice">Voice (min)</button>
      <button class="hm-pill" data-metric="sms">SMS</button>
      <button class="hm-pill" data-metric="any">Any Usage</button>
    </div>
  </div>

  <div class="hm-stats" id="stats"></div>

  <div class="hm-card">
    <h3>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="color: hsl(var(--primary));"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" x2="9" y1="3" y2="21"/><line x1="15" x2="15" y1="3" y2="21"/></svg>
      Weekday × Hour Heatmap
      <span class="hm-card-meta" id="grid-meta"></span>
    </h3>
    <div id="heatmap-grid"></div>
    <div class="hm-legend">
      <span>Intensity:</span>
      <div class="hm-legend-labels">
        <span id="legend-min">0</span>
        <span>→</span>
        <span id="legend-max">0</span>
      </div>
      <div class="hm-legend-gradient" style="background: linear-gradient(to right, hsl(var(--muted) / 0.25), #fef3c7, #fcd34d, #f59e0b, #dc2626);"></div>
    </div>
  </div>

  <div class="hm-card">
    <h3>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="color: #10b981;"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      Peak Insights
    </h3>
    <div class="hm-insights" id="insights"></div>
  </div>

  <script src="/runtime/erpai-pages-runtime.js"></script>
  <script>
    const T = {
      utxs: '5d81244b8bef791c68fdbb49',
      sessions: 'a12c328f7b9c5df56d12ec6c',
    };

    const DAYS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    let state = { utxs: [], mUtx: null, metric: 'events' };

    async function fetchAll(tid, pageSize = 500) {
      const all = []; let page = 1;
      while (true) {
        const r = await erpai.api('POST', `/v1/app-builder/table/${tid}/paged-record?pageNo=${page}&pageSize=${pageSize}`, {});
        const batch = r?.data || [];
        all.push(...batch);
        if (batch.length < pageSize) break;
        page++;
      }
      return all;
    }

    async function load() {
      const r = await erpai.api('GET', `/v1/app-builder/table/${T.utxs}`);
      state.mUtx = {};
      for (const c of (r?.columnsMetaData || [])) state.mUtx[c.name] = c.id;
      state.utxs = await fetchAll(T.utxs);
      render();
    }

    function aggregate(metric) {
      // 7 days × 24 hours grid, init to 0
      const grid = Array.from({ length: 7 }, () => Array(24).fill(0));
      let total = 0;
      const tsCol = state.mUtx['Timestamp'];
      const rgCol = state.mUtx['Rating Group'];
      const usedCol = state.mUtx['Used Amount'];

      for (const u of state.utxs) {
        const ts = u.cells[tsCol];
        if (!ts) continue;
        const rg = Number(u.cells[rgCol]) || 0;
        const used = Number(u.cells[usedCol]) || 0;
        const d = new Date(ts);
        if (isNaN(d)) continue;
        const day = d.getDay();
        const hour = d.getHours();

        let v = 0;
        switch (metric) {
          case 'events': v = 1; break;
          case 'data':   v = (rg >= 10 && rg < 100) ? used : 0; break;
          case 'voice':  v = (rg >= 100 && rg < 200) ? used : 0; break;
          case 'sms':    v = (rg >= 200 && rg < 300) ? used : 0; break;
          case 'any':    v = used; break;
        }
        grid[day][hour] += v;
        total += v;
      }
      return { grid, total };
    }

    function findMax(grid) {
      let max = 0, peakDay = 0, peakHour = 0;
      for (let d = 0; d < 7; d++) {
        for (let h = 0; h < 24; h++) {
          if (grid[d][h] > max) { max = grid[d][h]; peakDay = d; peakHour = h; }
        }
      }
      return { max, peakDay, peakHour };
    }

    function findMin(grid) {
      let min = Infinity, minDay = 0, minHour = 0;
      for (let d = 0; d < 7; d++) {
        for (let h = 0; h < 24; h++) {
          if (grid[d][h] < min) { min = grid[d][h]; minDay = d; minHour = h; }
        }
      }
      return { min: min === Infinity ? 0 : min, minDay, minHour };
    }

    function gradient(value, max) {
      if (!max || value === 0) return 'hsl(var(--muted) / 0.25)';
      const pct = Math.min(1, value / max);
      // 0 → muted, 0.25 → yellow-200, 0.5 → amber-300, 0.75 → amber-500, 1 → red-600
      if (pct < 0.1) return `hsl(var(--muted) / ${0.25 + pct * 2})`;
      if (pct < 0.33) return `rgba(254, 243, 199, ${0.8 + pct * 0.5})`;
      if (pct < 0.6)  return `rgba(252, 211, 77, ${0.8 + pct * 0.4})`;
      if (pct < 0.85) return `rgba(245, 158, 11, ${0.85 + pct * 0.2})`;
      return `rgba(220, 38, 38, ${0.85 + pct * 0.15})`;
    }

    function unitLabel() {
      return { events: 'events', data: 'MB', voice: 'min', sms: 'SMS', any: 'units' }[state.metric];
    }
    function metricLabel() {
      return { events: 'Event Count', data: 'Data (MB)', voice: 'Voice (min)', sms: 'SMS', any: 'Any Usage' }[state.metric];
    }

    function render() {
      const { grid, total } = aggregate(state.metric);
      const { max, peakDay, peakHour } = findMax(grid);

      // Stats
      const dayTotals = grid.map(row => row.reduce((a,b) => a+b, 0));
      const hourTotals = Array(24).fill(0);
      for (const row of grid) for (let h=0; h<24; h++) hourTotals[h] += row[h];
      const peakHourOverall = hourTotals.indexOf(Math.max(...hourTotals));
      const peakDayOverall = dayTotals.indexOf(Math.max(...dayTotals));

      // Weekend vs weekday
      const weekendTotal = dayTotals[0] + dayTotals[6]; // Sun + Sat
      const weekdayTotal = dayTotals.slice(1, 6).reduce((a,b)=>a+b,0);
      const weekendPct = total ? (weekendTotal / total * 100) : 0;

      const unit = unitLabel();
      const fmtV = (v) => state.metric === 'data' && v >= 1024 ? `${(v/1024).toFixed(2)} GB` : `${v.toFixed(state.metric === 'voice' ? 1 : 0)} ${unit}`;

      document.getElementById('stats').innerHTML = [
        { label: 'Peak Hour', val: `${String(peakHourOverall).padStart(2,'0')}:00`, sub: `${fmtV(hourTotals[peakHourOverall])} during this hour`, color: 'hsl(var(--primary))' },
        { label: 'Peak Day', val: DAYS[peakDayOverall], sub: `${fmtV(dayTotals[peakDayOverall])} total`, color: '#10b981' },
        { label: 'Weekend Share', val: `${weekendPct.toFixed(0)}%`, sub: `${fmtV(weekendTotal)} Sat+Sun of ${fmtV(total)}`, color: '#f59e0b' },
        { label: 'Total', val: fmtV(total), sub: `${state.utxs.length} events analyzed`, color: '#8b5cf6' },
      ].map(s => `
        <div class="hm-stat">
          <div class="hm-stat-label" style="color: ${s.color}">${s.label}</div>
          <div class="hm-stat-val" style="color: ${s.color}">${s.val}</div>
          <div class="hm-stat-sub">${s.sub}</div>
        </div>
      `).join('');

      // Heatmap grid
      let gridHTML = `<div class="hm-grid">`;
      gridHTML += `<div></div>`;
      for (let h = 0; h < 24; h++) {
        gridHTML += `<div class="hour-header">${String(h).padStart(2,'0')}</div>`;
      }
      for (let d = 0; d < 7; d++) {
        gridHTML += `<div class="day-label">${DAYS[d]}</div>`;
        for (let h = 0; h < 24; h++) {
          const v = grid[d][h];
          const color = gradient(v, max);
          const tooltip = `${DAYS[d]} ${String(h).padStart(2,'0')}:00 — ${fmtV(v)}`;
          gridHTML += `<div class="hm-cell" style="background: ${color};" title="${tooltip}"></div>`;
        }
      }
      gridHTML += `</div>`;
      document.getElementById('heatmap-grid').innerHTML = gridHTML;
      document.getElementById('grid-meta').textContent = `${metricLabel()} · ${state.utxs.length} events`;
      document.getElementById('legend-min').textContent = '0';
      document.getElementById('legend-max').textContent = fmtV(max);

      // Insights
      const { min, minDay, minHour } = findMin(grid);
      document.getElementById('insights').innerHTML = `
        <div class="hm-insight">
          <div class="hm-insight-title">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="color: #ef4444;"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            Peak Cell
          </div>
          <div class="hm-insight-value">${DAYS[peakDay]} ${String(peakHour).padStart(2,'0')}:00 — ${fmtV(max)}</div>
          <div class="hm-insight-sub">highest single hour/day combination</div>
        </div>
        <div class="hm-insight">
          <div class="hm-insight-title">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="color: #3b82f6;"><path d="M12 2a10 10 0 1 0 10 10 4 4 0 1 1-5-5 4 4 0 1 1-5-5"/></svg>
            Quiet Cell
          </div>
          <div class="hm-insight-value">${DAYS[minDay]} ${String(minHour).padStart(2,'0')}:00 — ${fmtV(min)}</div>
          <div class="hm-insight-sub">lowest single hour/day combination</div>
        </div>
        <div class="hm-insight">
          <div class="hm-insight-title">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="color: #8b5cf6;"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
            Daily Avg
          </div>
          <div class="hm-insight-value">${fmtV(total / 7)}</div>
          <div class="hm-insight-sub">mean usage per day of week</div>
        </div>
      `;
    }

    // Metric pill handler
    document.querySelectorAll('#metric-pills .hm-pill').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#metric-pills .hm-pill').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.metric = btn.dataset.metric;
        render();
      });
    });

    load();
  </script>
</body>
</html>
