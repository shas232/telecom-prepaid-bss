<script>
window.ERPAI = {
  token: 'erp_pat_live_REDACTED',
  baseUrl: 'https://api.erpai.studio',
  appId: 'afe8c4540708da6ca9e6fe79',
  orgName: 'Telecom',
  appName: 'telecom',
  theme: 'light'
};
</script>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prepaid Customer Balances</title>
  <link rel="stylesheet" href="/runtime/erpai-pages-runtime.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { padding: 20px; font-family: 'Geist Sans', system-ui, -apple-system, sans-serif; }
    .cb-header { margin-bottom: 20px; display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
    .cb-title { font-size: 18px; font-weight: 600; color: hsl(var(--foreground)); letter-spacing: -0.02em; margin: 0; }
    .cb-subtitle { font-size: 13px; color: hsl(var(--muted-foreground)); margin-top: 2px; }
    .cb-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 12px; font-size: 13px; font-weight: 500; border-radius: 8px; border: 1px solid hsl(var(--border)); background: hsl(var(--background)); color: hsl(var(--foreground)); cursor: pointer; }
    .cb-btn:hover { background: hsl(var(--muted) / 0.4); }

    .cb-stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; }
    @media (max-width: 900px) { .cb-stats { grid-template-columns: repeat(2, 1fr); } }
    .cb-stat { background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: 12px; padding: 14px; box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05); }
    .cb-stat-label { font-size: 11px; color: hsl(var(--muted-foreground)); text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
    .cb-stat-val { font-size: 22px; font-weight: 600; font-variant-numeric: tabular-nums; }

    .cb-chart-card { padding: 16px; margin-bottom: 20px; background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: 12px; box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05); }
    .cb-chart-head { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .cb-chart-title { font-size: 14px; font-weight: 600; margin: 0; color: hsl(var(--foreground)); }
    .cb-chart-canvas-wrap { position: relative; height: 260px; }

    .cb-section-head { display: flex; align-items: center; gap: 8px; margin: 20px 0 12px; }
    .cb-section-title { font-size: 14px; font-weight: 600; margin: 0; color: hsl(var(--foreground)); }
    .cb-section-count { font-size: 12px; color: hsl(var(--muted-foreground)); font-weight: 500; }

    .cb-search-row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
    .cb-search { flex: 1; max-width: 320px; position: relative; }
    .cb-search input { width: 100%; padding: 8px 12px 8px 34px; font-size: 13px; background: hsl(var(--background)); border: 1px solid hsl(var(--border)); border-radius: 8px; color: hsl(var(--foreground)); }
    .cb-search input:focus { outline: none; border-color: hsl(var(--primary)); box-shadow: 0 0 0 3px hsl(var(--primary) / 0.1); }
    .cb-search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: hsl(var(--muted-foreground)); pointer-events: none; }

    .cb-table { width: 100%; border-collapse: collapse; background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: 12px; overflow: hidden; box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05); }
    .cb-table thead { background: hsl(var(--muted) / 0.5); }
    .cb-table th { text-align: left; font-size: 12px; font-weight: 600; color: hsl(var(--muted-foreground)); text-transform: uppercase; letter-spacing: 0.04em; padding: 10px 12px; border-bottom: 1px solid hsl(var(--border)); }
    .cb-table td { padding: 10px 12px; border-bottom: 1px solid hsl(var(--border)); font-size: 13px; color: hsl(var(--foreground)); vertical-align: middle; }
    .cb-table tbody tr:last-child td { border-bottom: none; }
    .cb-table tbody tr { cursor: pointer; transition: background 0.12s; }
    .cb-table tbody tr:hover { background: hsl(var(--muted) / 0.4); }

    .cb-bar { display: flex; flex-direction: column; gap: 3px; }
    .cb-bar-value { font-weight: 600; color: hsl(var(--foreground)); font-size: 12px; font-variant-numeric: tabular-nums; }
    .cb-bar-track { height: 6px; border-radius: 999px; background: hsl(var(--muted)); overflow: hidden; }
    .cb-bar-fill { height: 100%; border-radius: 999px; transition: width 0.4s ease; }
    .cb-bar-fill.data { background: #3b82f6; }
    .cb-bar-fill.voice { background: #10b981; }
    .cb-bar-fill.sms { background: #f59e0b; }
    .cb-bar-fill.low { background: #ef4444; }

    .cb-msisdn { font-variant-numeric: tabular-nums; font-family: 'SF Mono', Monaco, Menlo, monospace; font-size: 12px; color: hsl(var(--muted-foreground)); }
    .cb-plan { font-weight: 500; }
  </style>
</head>
<body>
  <div class="cb-header">
    <div>
      <h1 class="cb-title">Prepaid Customer Balances</h1>
      <p class="cb-subtitle">Real-time view of customer plans, remaining allowances, and Diameter usage.</p>
    </div>
    <button class="cb-btn" onclick="window.location.reload()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
      Refresh
    </button>
  </div>

  <div class="cb-stats" id="stats"></div>

  <div class="cb-section-head">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="color: hsl(var(--primary));"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/></svg>
    <h2 class="cb-section-title">Customers & Subscriptions</h2>
    <span class="cb-section-count" id="sub-count"></span>
  </div>

  <div class="cb-search-row">
    <div class="cb-search">
      <svg class="cb-search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="search" id="search" placeholder="Search by name or MSISDN..." oninput="onSearch(event)">
    </div>
  </div>

  <div id="table-wrap"></div>

  <script src="/runtime/erpai-pages-runtime.js"></script>
  <script>
    const T = {
      customers: 'aed243e6c13b8f5194724d76',
      subs: '495e7f2e36663583722c8ec8',
      balances: '9daeb0991b806538ceab887f',
      tariffs: 'f2e797515f347f862e71a641',
      utxs: '5d81244b8bef791c68fdbb49',
      sessions: 'a12c328f7b9c5df56d12ec6c',
    };

    const STATE = { rows: [], filter: '' };

    async function fetchAll(tid, pageSize = 500) {
      const all = []; let page = 1;
      while (true) {
        const r = await erpai.api('POST', `/v1/app-builder/table/${tid}/paged-record?pageNo=${page}&pageSize=${pageSize}`, {});
        const batch = r?.data || [];
        all.push(...batch);
        if (batch.length < pageSize) break;
        page++;
      }
      return all;
    }
    async function cmap(tid) {
      const r = await erpai.api('GET', `/v1/app-builder/table/${tid}`);
      const m = {};
      for (const c of (r?.columnsMetaData || [])) m[c.name] = c.id;
      return m;
    }

    function fmtMB(n) { return n >= 1024 ? `${(n/1024).toFixed(2)} GB` : `${Math.round(n)} MB`; }
    function fmtMin(n) { return n > 99999 ? '∞' : `${Math.round(n*10)/10} min`; }

    function renderBar(used, total, cls) {
      if (total > 99999) return `<div class="cb-bar"><div class="cb-bar-value">Unlimited</div><div class="cb-bar-track"><div class="cb-bar-fill ${cls}" style="width:100%"></div></div></div>`;
      const remaining = Math.max(0, total - used);
      const pct = total > 0 ? Math.min(100, Math.max(0, (remaining/total)*100)) : 0;
      const low = pct > 0 && pct < 20 ? ' low' : '';
      const displayRem = cls === 'data' ? fmtMB(remaining) : cls === 'voice' ? fmtMin(remaining) : `${Math.round(remaining)}`;
      return `
        <div class="cb-bar">
          <div class="cb-bar-value">${displayRem}</div>
          <div class="cb-bar-track"><div class="cb-bar-fill ${cls}${low}" style="width: ${pct}%"></div></div>
        </div>`;
    }

    function renderStats(s) {
      const el = document.getElementById('stats');
      const stat = (label, value, icon, color) => `
        <div class="cb-stat">
          <div class="cb-stat-label" style="color:${color}">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${icon}</svg>
            ${label}
          </div>
          <div class="cb-stat-val" style="color:${color}">${value}</div>
        </div>`;
      el.innerHTML = [
        stat('Customers', s.customers, '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/>', 'hsl(var(--primary))'),
        stat('Active Subscriptions', s.subs, '<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>', '#3b82f6'),
        stat('Charging Sessions', s.sessions, '<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>', '#10b981'),
        stat('Events (total)', s.utxs, '<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>', '#f59e0b'),
        stat('Depleted Balances', s.depleted, '<rect x="2" y="7" width="16" height="10" rx="2"/><line x1="22" x2="22" y1="11" y2="13"/>', s.depleted > 0 ? '#ef4444' : 'hsl(var(--muted-foreground))'),
      ].join('');
    }

    function renderTable() {
      const filtered = !STATE.filter ? STATE.rows : STATE.rows.filter(r =>
        r.customer_name.toLowerCase().includes(STATE.filter.toLowerCase()) ||
        r.msisdn.includes(STATE.filter)
      );
      document.getElementById('sub-count').textContent = `${filtered.length} of ${STATE.rows.length} subscriptions`;

      if (!filtered.length) {
        document.getElementById('table-wrap').innerHTML = `<div class="cb-stat">No subscriptions match your search.</div>`;
        return;
      }

      document.getElementById('table-wrap').innerHTML = `
        <table class="cb-table">
          <thead><tr>
            <th>Customer</th><th>MSISDN</th><th>Current Plan</th>
            <th>Data Remaining</th><th>Voice Remaining</th><th>SMS Remaining</th>
          </tr></thead>
          <tbody>${filtered.map(r => `
            <tr>
              <td style="font-weight: 500;">${erpai.esc(r.customer_name)}</td>
              <td><span class="cb-msisdn">${erpai.esc(r.msisdn)}</span></td>
              <td><span class="cb-plan">${erpai.esc(r.plan_name || '—')}</span></td>
              <td>${renderBar(r.data_used, r.data_init, 'data')}</td>
              <td>${renderBar(r.voice_used, r.voice_init, 'voice')}</td>
              <td>${renderBar(r.sms_used, r.sms_init, 'sms')}</td>
            </tr>`).join('')}
          </tbody>
        </table>`;
    }

    window.onSearch = function(e) {
      STATE.filter = e.target.value.trim();
      renderTable();
    };

    async function main() {
      document.getElementById('stats').innerHTML = '<div class="cb-stat">Loading…</div>';

      const [customers, subs, balances, tariffs, utxs, sessions,
             mCust, mSub, mBal, mTariff, mUtx, mSess] = await Promise.all([
        fetchAll(T.customers), fetchAll(T.subs), fetchAll(T.balances),
        fetchAll(T.tariffs), fetchAll(T.utxs), fetchAll(T.sessions),
        cmap(T.customers), cmap(T.subs), cmap(T.balances),
        cmap(T.tariffs), cmap(T.utxs), cmap(T.sessions),
      ]);

      // Compute Used per Balance
      const usedByBalance = new Map();
      for (const u of utxs) {
        const balId = u.cells[mUtx['Balance']]?.[0];
        if (!balId) continue;
        const used = Number(u.cells[mUtx['Used Amount']]) || 0;
        usedByBalance.set(balId, (usedByBalance.get(balId) || 0) + used);
      }

      // Events today
      const today = new Date().toISOString().slice(0, 10);
      const eventsToday = utxs.filter(u => {
        const ts = u.cells[mUtx['Timestamp']];
        return ts && new Date(ts).toISOString().slice(0, 10) === today;
      }).length;

      // Depleted count — balances where used >= initial
      let depleted = 0;
      for (const b of balances) {
        const init = Number(b.cells[mBal['Initial Amount']]) || 0;
        if (init > 99999) continue; // unlimited
        const used = usedByBalance.get(b._id) || 0;
        if (init > 0 && used >= init) depleted++;
      }

      renderStats({
        customers: customers.length,
        subs: subs.length,
        sessions: sessions.length,
        utxs: utxs.length,
        depleted,
      });

      // Build customer-subscription rows
      const custById = new Map(customers.map(c => [c._id, c]));
      const tariffById = new Map(tariffs.map(t => [t._id, t]));
      const balancesBySub = new Map();
      for (const b of balances) {
        const sid = b.cells[mBal['Subscription']]?.[0];
        if (!sid) continue;
        if (!balancesBySub.has(sid)) balancesBySub.set(sid, []);
        balancesBySub.get(sid).push(b);
      }

      const rows = [];
      for (const s of subs) {
        const cust = custById.get(s.cells[mSub['Customer']]?.[0]);
        if (!cust) continue;
        const sBals = balancesBySub.get(s._id) || [];
        let dataInit = 0, dataUsed = 0, voiceInit = 0, voiceUsed = 0, smsInit = 0, smsUsed = 0;
        let basePlanName = '—';
        let basePriority = -1;
        for (const b of sBals) {
          const init = Number(b.cells[mBal['Initial Amount']]) || 0;
          const used = usedByBalance.get(b._id) || 0;
          const rg = Number(b.cells[mBal['Rating Group']]) || 0;
          if (rg >= 10 && rg < 100) { dataInit += init; dataUsed += used; }
          else if (rg >= 100 && rg < 200) { voiceInit += init; voiceUsed += used; }
          else if (rg >= 200 && rg < 300) { smsInit += init; smsUsed += used; }

          // Determine base plan name
          const tpId = b.cells[mBal['Tariff Plan']]?.[0];
          if (tpId) {
            const tp = tariffById.get(tpId);
            if (tp) {
              const prio = Number(tp.cells[mTariff['Priority On Charge']]) || 10;
              if (prio > basePriority) {
                basePriority = prio;
                basePlanName = tp.cells[mTariff['Plan Name']] || '—';
              }
            }
          }
        }
        rows.push({
          customer_name: cust.cells[mCust['Name']] || '—',
          msisdn: s.cells[mSub['MSISDN']] || '—',
          plan_name: basePlanName,
          data_init: dataInit, data_used: dataUsed,
          voice_init: voiceInit, voice_used: voiceUsed,
          sms_init: smsInit, sms_used: smsUsed,
        });
      }
      rows.sort((a, b) => a.customer_name.localeCompare(b.customer_name) || a.msisdn.localeCompare(b.msisdn));
      STATE.rows = rows;
      renderTable();
    }
    main();
  </script>
</body>
</html>
